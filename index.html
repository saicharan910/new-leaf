<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Leaf — Finding Hope</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="dark-mode"> <header class="app-header">
        <div class="header-inner">
            <h1 class="logo">NEW LEAF</h1>
            <div class="controls">
                <button id="theme-toggle" class="theme-btn">🌗 Mode</button>
            </div>
        </div>
    </header>

    <div class="centered-container">
        <section class="intro-section">
            <p class="emergency-text">URGENT: 14416 (Tele-MANAS) | 1800-599-0019</p>
            <h2>Take a slow, deep breath.</h2>
            <p class="subtext">Select your language, speak your heart, and we will translate your story for our responders.</p>
        </section>

        <section class="glass-card voice-box">
            <div class="input-group">
                <label>NATIVE LANGUAGE</label>
                <select id="langSelect">
                    <option value="te-IN">Telugu (తెలుగు)</option>
                    <option value="hi-IN">Hindi (हिन्दी)</option>
                    <option value="ta-IN">Tamil (தமிழ்)</option>
                    <option value="kn-IN">Kannada (ಕನ್ನಡ)</option>
                    <option value="ml-IN">Malayalam (മലയാളం)</option>
                </select>
            </div>
            
            <button id="voiceBtn" class="btn-voice">🎤 Speak Your Heart</button>
            <p id="voiceStatus">Tap to record your message.</p>
        </section>

        <section class="glass-card form-box">
            <div class="input-group">
                <label>SELECT NEAREST CITY</label>
                <select id="userCitySelect">
                    <option value="" disabled selected>Select City...</option>
                    <option value="Tirupati">Tirupati</option>
                    <option value="Guntur">Guntur</option>
                    <option value="Vijayawada">Vijayawada</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="input-group" style="margin-top: 20px;">
                <label>YOUR STORY (ENGLISH TRANSCRIPT)</label>
                <textarea id="userStory" placeholder="Your spoken words will appear here in English..."></textarea>
            </div>

            <button onclick="sendToResponders()" class="btn-submit">SEND TO RESPONDERS</button>
        </section>

        <section id="hospital-section" class="glass-card hidden">
            <h3>Verified Help Near You</h3>
            <div id="hospital-list"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
